<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado Escolar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Sistema de Almoxarifado Escolar</h1>
        <p>Gerenciamento de Estoque, Procedures e Triggers</p>
    </header>

    <main class="container">
        <section class="card">
            <h2>Novo Produto</h2>
            <form id="form-produto">
                <input type="text" id="prod-nome" placeholder="Nome do Produto (Ex: Giz)" required>
                <textarea id="prod-descricao" placeholder="Descrição do material"></textarea>
                <input type="number" id="prod-critico" placeholder="Estoque Crítico (Padrão: 5)" min="0">
                <input type="number" id="prod-quantidade" placeholder="Quantidade Inicial no Estoque" min="0">
                <button type="submit">Cadastrar Produto</button>
            </form>
        </section>

        <section class="card">
            <h2>Registrar Movimentação</h2>
            <form id="form-movimentacao">
                <input type="number" id="mov-produto" placeholder="ID do Produto" required>
                <input type="number" id="mov-funcionario" placeholder="ID do Funcionário" required>
                <input type="number" id="mov-quantidade" placeholder="Quantidade" min="1" required>
                
                <div class="btn-group">
                    <button type="button" id="btn-entrada" class="btn-success">Registrar Entrada</button>
                    <button type="button" id="btn-saida" class="btn-danger">Registrar Saída (Procedure)</button>
                </div>
            </form>
        </section>

        <section class="card wide">
            <h2>Painel de Controle</h2>
            <div class="tab-buttons">
                <button onclick="carregarProdutos()">Todos os Produtos</button>
                <button onclick="carregarCriticos()" class="btn-warning">Estoque Crítico</button>
                <button onclick="carregarLogs()" style="background-color: #9b59b6; color: white;">Histórico de Logs</button>
            </div>
            
            <div class="table-container">
                <table id="tabela-dados">
                    <thead>
                        <tr id="cabecalho-tabela">
                            </tr>
                    </thead>
                    <tbody id="corpo-tabela">
                        <tr>
                            <td colspan="5" style="text-align: center;">Clique em um dos botões acima para carregar os dados.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
